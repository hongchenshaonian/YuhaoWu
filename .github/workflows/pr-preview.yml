name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: pr-preview-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR
        if: github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Checkout main for cleanup
        if: github.event.action == 'closed'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Ruby
        if: github.event.action != 'closed'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll preview
        if: github.event.action != 'closed'
        run: >-
          bundle exec jekyll build
          --destination _preview_site
          --baseurl "/pr-preview/pr-${{ github.event.number }}"

      # This action commits/removes pr-preview/pr-<number> on main.
      # The Deploy Pages workflow listens for this workflow to complete and
      # publishes the committed preview files from main. GitHub Actions pushes
      # made with GITHUB_TOKEN do not reliably trigger normal push workflows.
      # Do not deploy to the protected github-pages environment from this PR job.
      - name: Deploy preview files and comment
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_preview_site
          preview-branch: main
          umbrella-dir: pr-preview
          comment: true
          pages-base-url: yuhaowu.com
