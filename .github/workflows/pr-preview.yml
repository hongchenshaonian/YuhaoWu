name: PR Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency: pr-preview-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  deploy-preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout PR
        if: github.event.action != 'closed'
        uses: actions/checkout@v4

      - name: Checkout main for cleanup
        if: github.event.action == 'closed'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Build Jekyll preview
        if: github.event.action != 'closed'
        run: >-
          bundle exec jekyll build
          --destination _preview_site
          --baseurl "/pr-preview/pr-${{ github.event.number }}"

      - name: Deploy preview files and comment
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_preview_site
          preview-branch: main
          umbrella-dir: pr-preview
          comment: true
          pages-base-url: yuhaowu.com

      - name: Checkout latest main for Pages deployment
        uses: actions/checkout@v4
        with:
          ref: main
          path: _pages_source

      - name: Build production site and preserve previews
        working-directory: _pages_source
        run: |
          bundle exec jekyll build
          if [ -d pr-preview ]; then
            mkdir -p _site/pr-preview
            cp -a pr-preview/. _site/pr-preview/
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages_source/_site

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
