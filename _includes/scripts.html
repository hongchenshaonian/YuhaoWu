<script>
  (function() {
    var sectionIds = [
      'about-me',
      'education',
      'publications',
      'patents',
      'research-experience',
      'work-experience',
      'projects',
      'honors-awards',
      'services'
    ];
    var activeNavLock = '';
    var activeNavLockTimer = null;

    function keepFullNavVisible() {
      var visible = document.querySelector('#site-nav .visible-links');
      var hidden = document.querySelector('#site-nav .hidden-links');
      var button = document.querySelector('#site-nav button');
      if (!visible || !hidden) return;
      while (hidden.firstChild) {
        visible.appendChild(hidden.firstChild);
      }
      hidden.classList.add('hidden');
      if (button) button.classList.add('hidden');
    }

    function normalizeHash(href) {
      if (!href) return '';
      if (href.charAt(0) === '#') return href;
      try {
        var url = new URL(href, window.location.href);
        if (url.origin === window.location.origin && url.pathname === window.location.pathname) {
          return url.hash;
        }
      } catch (error) {
        return '';
      }
      return '';
    }

    function getNavOffset() {
      var masthead = document.querySelector('.masthead');
      return (masthead ? masthead.offsetHeight : 0) + 2;
    }

    function cleanHashFromLocation() {
      if (window.location.hash) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }

    function animateScrollTo(targetY) {
      var startY = window.pageYOffset;
      var distance = targetY - startY;
      var duration = Math.min(900, Math.max(360, Math.abs(distance) / 3));
      var startTime = null;

      function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
      }

      function step(timestamp) {
        if (startTime === null) startTime = timestamp;
        var elapsed = timestamp - startTime;
        var progress = Math.min(1, elapsed / duration);
        window.scrollTo(0, startY + distance * easeInOutCubic(progress));
        if (progress < 1) {
          window.requestAnimationFrame(step);
        }
      }

      window.requestAnimationFrame(step);
      return duration;
    }

    function scrollToHash(hash, smooth) {
      if (!hash) return false;
      var target = document.getElementById(hash.slice(1));
      if (!target) return false;
      var heading = target.nextElementSibling;
      var scrollTarget = heading && /^H[1-6]$/.test(heading.tagName) ? heading : target;
      var y = scrollTarget.getBoundingClientRect().top + window.pageYOffset - getNavOffset();
      var targetY = Math.max(0, y);
      if (smooth && window.requestAnimationFrame) {
        return animateScrollTo(targetY);
      }
      window.scrollTo(0, targetY);
      return 0;
    }

    function lockActiveNav(hash, duration) {
      activeNavLock = hash;
      if (activeNavLockTimer) {
        window.clearTimeout(activeNavLockTimer);
      }
      activeNavLockTimer = window.setTimeout(function() {
        activeNavLock = '';
        updateActiveNav();
      }, duration + 150);
    }

    function setActiveNav(hash) {
      var navItems = document.querySelectorAll('#site-nav .visible-links li');
      var activeLink = null;
      navItems.forEach(function(item) {
        var link = item.querySelector('a');
        var itemHash = link ? normalizeHash(link.getAttribute('href')) : '';
        item.classList.remove('is-active');
        if (itemHash === hash) {
          activeLink = link;
        }
      });
      if (activeLink) {
        activeLink.closest('li').classList.add('is-active');
      }
    }

    function updateActiveNav() {
      if (activeNavLock) {
        setActiveNav(activeNavLock);
        return;
      }
      var offset = getNavOffset() + 4;
      var current = '#about-me';
      sectionIds.forEach(function(id) {
        var section = document.getElementById(id);
        if (section && section.getBoundingClientRect().top <= offset) {
          current = '#' + id;
        }
      });
      setActiveNav(current);
    }

    function bindNavScrolling() {
      document.querySelectorAll('#site-nav a').forEach(function(link) {
        link.addEventListener('click', function(event) {
          var hash = normalizeHash(link.getAttribute('href'));
          var duration = scrollToHash(hash, true);
          if (duration !== false) {
            event.preventDefault();
            cleanHashFromLocation();
            lockActiveNav(hash, duration);
            setActiveNav(hash);
          }
        });
      });
    }

    keepFullNavVisible();
    bindNavScrolling();
    updateActiveNav();
    if (window.location.hash) {
      var initialHash = window.location.hash;
      window.setTimeout(function() {
        scrollToHash(initialHash, false);
        setActiveNav(initialHash);
        cleanHashFromLocation();
      }, 50);
    }
    window.addEventListener('load', keepFullNavVisible);
    window.addEventListener('load', updateActiveNav);
    window.addEventListener('resize', keepFullNavVisible);
    window.addEventListener('resize', updateActiveNav);
    window.addEventListener('scroll', updateActiveNav, { passive: true });
    window.addEventListener('hashchange', function() {
      var hash = window.location.hash;
      if (scrollToHash(hash, false)) {
        setActiveNav(hash);
        window.setTimeout(cleanHashFromLocation, 0);
      }
    });
  }());
</script>
