<script>
  (function() {
    var sectionIds = [
      'about-me',
      'education',
      'publications',
      'patents',
      'research-experience',
      'work-experience',
      'projects',
      'honors-awards',
      'services'
    ];

    function keepFullNavVisible() {
      var visible = document.querySelector('#site-nav .visible-links');
      var hidden = document.querySelector('#site-nav .hidden-links');
      var button = document.querySelector('#site-nav button');
      if (!visible || !hidden) return;
      while (hidden.firstChild) {
        visible.appendChild(hidden.firstChild);
      }
      hidden.classList.add('hidden');
      if (button) button.classList.add('hidden');
    }

    function normalizeHash(href) {
      if (!href) return '';
      if (href.charAt(0) === '#') return href;
      try {
        var url = new URL(href, window.location.href);
        if (url.origin === window.location.origin && url.pathname === window.location.pathname) {
          return url.hash;
        }
      } catch (error) {
        return '';
      }
      return '';
    }

    function getNavOffset() {
      var masthead = document.querySelector('.masthead');
      return (masthead ? masthead.offsetHeight : 0) + 20;
    }

    function cleanHashFromLocation() {
      if (window.location.hash) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }

    function scrollToHash(hash) {
      if (!hash) return false;
      var target = document.getElementById(hash.slice(1));
      if (!target) return false;
      var y = target.getBoundingClientRect().top + window.pageYOffset - getNavOffset();
      window.scrollTo({ top: Math.max(0, y), behavior: 'auto' });
      return true;
    }

    function setActiveNav(hash) {
      var navItems = document.querySelectorAll('#site-nav .visible-links li');
      var activeLink = null;
      navItems.forEach(function(item) {
        var link = item.querySelector('a');
        var itemHash = link ? normalizeHash(link.getAttribute('href')) : '';
        item.classList.remove('is-active');
        if (itemHash === hash) {
          activeLink = link;
        }
      });
      if (activeLink) {
        activeLink.closest('li').classList.add('is-active');
      }
    }

    function updateActiveNav() {
      var offset = getNavOffset() + 4;
      var current = '#about-me';
      sectionIds.forEach(function(id) {
        var section = document.getElementById(id);
        if (section && section.getBoundingClientRect().top <= offset) {
          current = '#' + id;
        }
      });
      setActiveNav(current);
    }

    function bindNavScrolling() {
      document.querySelectorAll('#site-nav a').forEach(function(link) {
        link.addEventListener('click', function(event) {
          var hash = normalizeHash(link.getAttribute('href'));
          if (scrollToHash(hash)) {
            event.preventDefault();
            cleanHashFromLocation();
            setActiveNav(hash);
          }
        });
      });
    }

    keepFullNavVisible();
    bindNavScrolling();
    updateActiveNav();
    if (window.location.hash) {
      var initialHash = window.location.hash;
      window.setTimeout(function() {
        scrollToHash(initialHash);
        setActiveNav(initialHash);
        cleanHashFromLocation();
      }, 50);
    }
    window.addEventListener('load', keepFullNavVisible);
    window.addEventListener('load', updateActiveNav);
    window.addEventListener('resize', keepFullNavVisible);
    window.addEventListener('resize', updateActiveNav);
    window.addEventListener('scroll', updateActiveNav, { passive: true });
    window.addEventListener('hashchange', function() {
      var hash = window.location.hash;
      if (scrollToHash(hash)) {
        setActiveNav(hash);
        window.setTimeout(cleanHashFromLocation, 0);
      }
    });
  }());
</script>
